<html>
    <head>
        <meta charset="utf-8">
        <title>
            calculator project 
        </title>
        <!--<link rel="stylesheet" href="style.css">-->     
        <style>
            body{
    background-color: lightgoldenrodyellow;
    align-content: center;
}
.cbtn{
    background-color: rgba(218, 8, 53,1);
    width: 50;
    height: 100%;
}
.main{
    align-content: center;
}
.btn{
    background-color: #eee;
    width:100%;
    height: 100%;
}
table{
    height: 300;
    width: 200;
    margin-left: 100px;
    margin-top: 200px;
}
#screen{
    height: 100%;   
    background-color: #00ee00; 
}
        </style>
    </head>
    <body>
        <div class="main">
            <table border="1">
                <tr>
                    <td><input class="cbtn" type="button" value="c" onclick="clr()"/></td>
                    <td colspan="3"><input type="text" id="screen"/></td>
                </tr>
                <tr>
                    <td><input type="button" class="btn" value="+" onclick="disp('+')"/></td>
                    <td><input type="button" class="btn" value="9" onclick="disp('9')"/></td>
                    <td><input type="button" class="btn" value="8" onclick="disp('8')"/></td>
                    <td><input type="button" class="btn" value="7" onclick="disp('7')"/></td>
                </tr>
                <tr>
                    <td><input type="button" class="btn" value="- " onclick="disp('-')"/></td>
                    <td><input type="button" class="btn" value="4" onclick="disp('4')"/></td>
                    <td><input type="button" class="btn" value="5" onclick="disp('5')"/></td>
                    <td><input type="button" class="btn" value="6" onclick="disp('6')"/></td>
                </tr>
                <tr>
                    <td><input type="button" class="btn" value="&#247" onclick="disp('/')"/></td>
                    <td><input type="button" class="btn" value="1" onclick="disp('1')"/></td>
                    <td><input type="button" class="btn" value="2" onclick="disp('2')"/></td>
                    <td><input type="button" class="btn" value="3" onclick="disp('3')"/></td>
                </tr>
                <tr>
                    <td><input type="button" class="btn" value="&#215" onclick="disp('*')"/></td>
                    <td><input type="button" class="btn" value="0" onclick="disp('0')"/></td>
                    <td><input type="button" class="btn" value=". " onclick="disp('.')"/></td>
                    <td><input type="button" class="btn" value="=" onclick="solve()"/></td>
                </tr>
            </table>
        </div>
    </body>
</html>
<script>
    function disp(val) {
    document.getElementById("screen").value += val;
}
function solve() {
    let x = document.getElementById("screen").value;
    let y = eval(x);
    document.getElementById("screen").value = y;
}
function clr(){
    document.getElementById("screen").value = "";
}
</script>
